name: Release

on:
  push:
    tags:
      - 'v*'

# Required to create GitHub Releases and upload assets
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APKs with version and arch
        run: |
          for f in app/build/outputs/apk/release/app-*-release.apk; do
            arch=$(basename "$f" -release.apk); arch=${arch#app-}
            mv "$f" "app/build/outputs/apk/release/econverter-${GITHUB_REF_NAME}-${arch}.apk"
          done

      - name: Clean up keystore
        if: always()
        run: rm -f app/release.keystore

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/econverter-*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
